name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-dlife
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p 2222 -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo fuser -k 3001/tcp || true && cd /var/www/diabeteslife && git fetch origin && git reset --hard origin/main && npm install && rm -rf .next && npm run build && pm2 restart dlife-nextjs || pm2 start ecosystem.config.js && pm2 save && echo Deploy complete"
