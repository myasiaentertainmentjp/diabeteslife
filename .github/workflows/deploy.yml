name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-dlife
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://diabeteslife.jp
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run build

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            -e "ssh -p 2222" \
            .next/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/diabeteslife/.next/
          rsync -az \
            -e "ssh -p 2222" \
            public/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/diabeteslife/public/
          rsync -az \
            -e "ssh -p 2222" \
            package.json package-lock.json \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/diabeteslife/

      - name: Restart PM2
        run: |
          ssh -p 2222 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd /var/www/diabeteslife
            # メモリ確保のため他サービスを一時停止
            pm2 stop akabuy-dev || true
            pm2 stop graymall || true
            sleep 2
            # diabeteslifeを再起動
            pm2 reload diabeteslife
            sleep 3
            # 他サービスを再開
            pm2 start akabuy-dev || true
            pm2 start graymall || true
            echo "Deploy complete"
          ENDSSH
