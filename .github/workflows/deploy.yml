name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-dlife
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p 2222 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd /var/www/diabeteslife
            git fetch origin
            git reset --hard origin/main
            npm install

            # 他サイトを一時停止してメモリを確保
            pm2 stop akabuy-main || true
            pm2 stop graymall-nextjs || true

            export NODE_OPTIONS="--max-old-space-size=1536"
            npm run build

            # 他サイトを再起動
            pm2 start akabuy-main || true
            pm2 start graymall-nextjs || true

            pm2 restart dlife-nextjs || pm2 start ecosystem.config.js
            pm2 save
            echo "Deploy complete"
          ENDSSH
